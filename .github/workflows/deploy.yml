name: Chameleon Security Honeypot CI/CD

on:
  push:
    branches: [ "main", "deploy" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test, Check ML Models, and Build Docker
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # caching pip dependencies

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev  # For asyncpg / psycopg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # We assume requirements.txt has all packages including PyTorch & paramiko
        pip install -r Backend/requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Verify PyTorch & Model Integrity
      run: |
        # Quick check to ensure torch is installed and it can load our model weights (if present)
        python -c "
        import torch
        import os
        print(f'PyTorch version: {torch.__version__}')
        model_path = 'Backend/chameleon_lstm_m4_50k.pth'
        if os.path.exists(model_path):
            try:
                # Map location to CPU so it doesn't fail on GitHub Actions runners without GPUs
                checkpoint = torch.load(model_path, map_location=torch.device('cpu'))
                print('✅ Model loaded successfully!')
            except Exception as e:
                print(f'❌ Failed to load model checkpoint: {e}')
                exit(1)
        else:
            print('⚠️ Model files not found in repository. Skipping load check.')
        "

    - name: Run Pytest Coverage
      run: |
        # Assuming you have functional tests under Backend/
        # Make sure to set any necessary ENV vars for tests
        cd Backend
        pytest test_system.py test_honeytoken.py test_trap_execute.py -v

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker image (Dry Run)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false # Set to true to actually push to GHCR / DockerHub
        tags: chameleon-honeypot:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
